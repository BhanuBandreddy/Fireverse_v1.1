[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# DB schema sync runs in Dockerfile CMD so DATABASE_URL + /app layout match runtime
healthcheckPath = "/api/health"
# First boot runs `prisma db push` before Node listens — allow enough time
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
