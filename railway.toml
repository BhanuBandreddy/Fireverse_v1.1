# Backend service — Railway reads this from repo root
[build]
builder = "nixpacks"
buildCommand = "cd backend && npm ci && npx prisma generate && npx tsc -p backend/tsconfig.json"

[deploy]
startCommand = "cd backend && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
