# Backend service — Railway reads this from repo root
[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm ci && VITE_API_BASE_URL=/api npm run build && cd ../backend && npm ci && npm run build"

[deploy]
startCommand = "cd backend && npx prisma db push --accept-data-loss && node dist/seed.js && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
